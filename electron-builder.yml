appId: com.electron.video-downloader
productName: Electron Video Downloader
copyright: Copyright © 2024

directories:
  output: dist-builder
  buildResources: build

files:
  - dist/**/*
  - package.json

# extraResources will be enabled when binaries are available
# extraResources:
#   - resources/bin/yt-dlp.exe
#   - resources/bin/ffmpeg.exe

win:
  target:
    - nsis
  icon: build/icon.ico
  artifactName: ${productName}-Setup-${version}.${ext}
  sign: null  # Disable code signing for now

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  license: LICENSE.txt

publish:
  provider: github
  owner: your-username
  repo: electron-video-downloader
